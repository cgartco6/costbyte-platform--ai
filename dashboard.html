<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Venture Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-4xl mx-auto space-y-8">
        <div class="bg-white border-4 border-black p-8 shadow-[12px_12px_0px_#000]">
            <h2 class="text-3xl font-black uppercase mb-6 flex justify-between">
                Build Status 
                <span class="text-sm bg-black text-white px-3 py-1">FIXER: ACTIVE</span>
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div class="p-4 bg-slate-100 font-bold border-2 border-black">
                        <i data-lucide="code" class="inline mr-2"></i> Storefront: <span class="text-indigo-600 italic">Compiling...</span>
                    </div>
                    <div class="p-4 bg-slate-100 font-bold border-2 border-black">
                        <i data-lucide="package" class="inline mr-2"></i> Digital Logistics: <span class="text-green-600">Locker API Ready</span>
                    </div>
                </div>
                <div class="bg-indigo-600 text-white p-6 border-4 border-black">
                    <h4 class="font-black uppercase text-sm mb-2">Build Upgrades (Included)</h4>
                    <ul class="text-[10px] space-y-1 font-bold uppercase">
                        <li>✓ Global Payment Gateway Handshake</li>
                        <li>✓ Automated Refund Logic</li>
                        <li>✓ High-Speed Server Deployment</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
