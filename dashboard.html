<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Neural Progress | CostByte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-xl relative overflow-hidden">
            <div id="progress-bar" class="absolute top-0 left-0 h-2 bg-indigo-600 transition-all duration-500" style="width: 5%"></div>
            
            <h2 class="text-3xl font-black mb-8 flex justify-between items-center">
                PROPER BUILD INITIATED
                <span id="percent" class="text-sm font-mono text-indigo-600">5%</span>
            </h2>

            <div id="steps" class="space-y-6">
                <div class="step flex gap-4 items-start">
                    <div class="w-6 h-6 rounded-full border-2 border-indigo-600 flex items-center justify-center mt-1" id="step1-icon"><i data-lucide="loader" class="w-3 h-3 animate-spin text-indigo-600"></i></div>
                    <div>
                        <p class="font-bold text-sm">Neural Asset Creation</p>
                        <p class="text-xs text-slate-500" id="step1-status">Analyzing vision for high-quality branding...</p>
                    </div>
                </div>
                </div>

            <div id="asset-preview" class="mt-12 p-6 bg-slate-900 rounded-2xl hidden">
                <p class="text-[10px] text-indigo-400 font-bold uppercase mb-4">Neural Asset Preview</p>
                <div id="preview-content" class="text-white font-mono text-xs whitespace-pre-wrap"></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const steps = [
            { t: "Asset Creation", d: "Designing Logo and Brand Palette...", p: 25 },
            { t: "Compliance Vault", d: "Drafting POPIA and GDPR legal documents...", p: 50 },
            { t: "Viral Engine", d: "Generating 20 Organic Outreach scripts...", p: 75 },
            { t: "Final Deployment", d: "Hardening security and going live...", p: 100 }
        ];

        let current = 0;
        const interval = setInterval(() => {
            if(current >= steps.length) {
                clearInterval(interval);
                finishBuild();
                return;
            }
            const s = steps[current];
            document.getElementById('percent').innerText = `${s.p}%`;
            document.getElementById('progress-bar').style.width = `${s.p}%`;
            document.getElementById('step1-status').innerText = s.d;
            current++;
        }, 5000); // 5 seconds per step for the "Proper" feel

        function finishBuild() {
            document.getElementById('asset-preview').classList.remove('hidden');
            document.getElementById('preview-content').innerText = `[SUCCESS] VENTURE ACTIVE
- LOGO: COSTBYTE_EMPIRE_V1
- LEGAL: POPIA_GEN_001.pdf
- SCRIPTS: TIKTOK_OUTREACH_V1.txt
- STATUS: SELF-HEALING ACTIVE`;
        }
    </script>
</body>
</html>
