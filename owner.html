<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Master Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-white p-8 font-mono">
    <div class="max-w-6xl mx-auto">
        <header class="border-b-2 border-indigo-900 pb-6 mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black uppercase">Sovereign Ledger</h1>
                <p class="text-indigo-400 text-[10px]">GEO-TARGETING & REVENUE SPLIT ACTIVE</p>
            </div>
            <div class="text-right text-[10px] text-slate-500">WEEKLY SETTLEMENT: FRIDAY 12:00</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10">
            <div class="bg-slate-900 p-6 border border-slate-800">
                <p class="text-[9px] text-slate-500 uppercase">FNB (30%)</p>
                <p id="fnb" class="text-2xl font-black">R0.00</p>
            </div>
            <div class="bg-slate-900 p-6 border border-slate-800">
                <p class="text-[9px] text-slate-500 uppercase">AB (20%)</p>
                <p id="ab" class="text-2xl font-black">R0.00</p>
            </div>
            <div class="bg-indigo-900/40 p-6 border border-indigo-500">
                <p class="text-[9px] text-indigo-400 uppercase">SYSTEM (50%)</p>
                <p id="sys" class="text-2xl font-black">R0.00</p>
            </div>
            <div class="bg-orange-900/20 p-6 border border-orange-600">
                <p class="text-[9px] text-orange-500 uppercase">TOTAL ARREARS</p>
                <p id="arrears" class="text-2xl font-black text-orange-500">R100.00</p>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 overflow-hidden">
            <table class="w-full text-[10px] text-left">
                <thead class="bg-black text-slate-500 uppercase">
                    <tr><th class="p-4">Client</th><th class="p-4">Platform</th><th class="p-4">Location</th><th class="p-4">Tier</th><th class="p-4">Status</th></tr>
                </thead>
                <tbody id="ledger-rows" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </div>

    <script>
        const clients = [
            {id: "CB-01", plat: "TikTok", geo: "Gauteng", tier: "Gold", status: "Paid"},
            {id: "CB-02", plat: "X/Twitter", geo: "W-Cape", tier: "Silver", status: "Slow-Mode"},
            {id: "CB-03", plat: "LinkedIn", geo: "London", tier: "Bronze", status: "Paid"}
        ];
        
        let fnb=0, ab=0, sys=0;
        clients.forEach(c => {
            const rev = c.tier === 'Gold' ? 999 : (c.tier === 'Silver' ? 599 : 250);
            if(c.status === "Paid") {
                fnb += rev * 0.3; ab += rev * 0.2; sys += rev * 0.5;
            }
            document.getElementById('ledger-rows').innerHTML += `
                <tr>
                    <td class="p-4">${c.id}</td>
                    <td class="p-4 text-indigo-400 font-bold">${c.plat}</td>
                    <td class="p-4 text-slate-400">${c.geo}</td>
                    <td class="p-4 font-black">${c.tier}</td>
                    <td class="p-4 ${c.status === 'Paid' ? 'text-green-500' : 'text-orange-500'} font-bold">${c.status}</td>
                </tr>
            `;
        });
        document.getElementById('fnb').innerText = `R${fnb.toFixed(2)}`;
        document.getElementById('ab').innerText = `R${ab.toFixed(2)}`;
        document.getElementById('sys').innerText = `R${sys.toFixed(2)}`;
        lucide.createIcons();
    </script>
</body>
</html>
