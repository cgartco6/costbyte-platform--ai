<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Sovereign Ledger | CostByte HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-900 p-8 font-sans">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-end border-b-2 border-slate-100 pb-12 mb-12">
            <div>
                <h1 class="text-4xl font-black tracking-tighter italic">SOVEREIGN LEDGER</h1>
                <p class="text-indigo-600 font-bold text-[10px] uppercase">30/20/50 Weekly Split Active</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-slate-400">NEXT SETTLEMENT</p>
                <p class="text-xl font-black">FRIDAY 12:00</p>
            </div>
        </header>

        <div class="grid md:grid-cols-4 gap-4 mb-12">
            <div class="p-6 bg-slate-50 rounded-2xl border border-slate-200">
                <p class="text-[10px] font-bold text-slate-400 mb-2">FREE (MAX 200)</p>
                <div class="flex items-end gap-2">
                    <p class="text-3xl font-black">188</p>
                    <p class="text-[10px] text-orange-600 font-bold pb-1">94% FULL</p>
                </div>
            </div>
            <div class="p-6 bg-slate-50 rounded-2xl border border-slate-200">
                <p class="text-[10px] font-bold text-slate-400 mb-2">BASIC (MAX 500)</p>
                <p class="text-3xl font-black">42</p>
            </div>
            <div class="p-6 bg-indigo-50 rounded-2xl border border-indigo-200">
                <p class="text-[10px] font-bold text-indigo-600 mb-2">PRO (MAX 200)</p>
                <p class="text-3xl font-black">12</p>
            </div>
            <div class="p-6 bg-slate-950 text-white rounded-2xl">
                <p class="text-[10px] font-bold text-slate-400 mb-2">PLATINUM (MAX 100)</p>
                <p class="text-3xl font-black">0</p>
            </div>
        </div>

        <button onclick="triggerAutonomousScaling()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-xs hover:bg-indigo-600 transition-all">Trigger Autonomous Upscale (Wait for R10k Reserve)</button>
    </div>

    <script>
        function triggerAutonomousScaling() {
            alert("Self-Healing Protocol: Scanning revenue reserves... R10k target not reached. Upscale delayed to protect cashflow.");
        }
    </script>
</body>
</html>
