<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin Console | Specialist Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-2xl font-black italic">FIXER CONSOLE <span class="text-indigo-600 text-xs font-mono ml-2">V_SYSTEM_RECURSIVE</span></h1>
            <div class="flex gap-4">
                <span class="bg-green-100 text-green-700 px-3 py-1 rounded text-[10px] font-black uppercase">HEALING: ON</span>
                <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded text-[10px] font-black uppercase">AGI_READY: TRUE</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-xl">
                <h3 class="font-bold mb-4 uppercase text-xs">Stress Test Environment</h3>
                <div class="space-y-4">
                    <button onclick="alert('Running AGI Stress Test... 100% Success')" class="w-full text-left p-4 bg-slate-950 text-white rounded-xl font-bold text-sm">Simulate 1,000 Outreach Nodes</button>
                    <button onclick="alert('Self-Healing Protocol: All systems operational.')" class="w-full text-left p-4 bg-slate-900 text-white rounded-xl font-bold text-sm">Run Core Integrity Scan</button>
                </div>
            </div>

            <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-xl">
                <h3 class="font-bold mb-4 uppercase text-xs">Fixer Pipeline</h3>
                <div class="p-4 bg-indigo-50 border border-indigo-200 rounded-xl">
                    <p class="text-xs font-bold text-indigo-700 mb-2">Build #CB-7721 - Waiting for QC</p>
                    <div class="flex gap-2">
                        <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold">APPROVE & LAUNCH</button>
                        <button class="bg-white border border-indigo-200 px-4 py-2 rounded-lg text-[10px] font-bold">MANUAL FIX</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
